name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync files to server
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude ".git" --exclude ".github"
          path: ./
          remote_path: /opt/xcinema/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_KEY }}

      - name: Write .env from secret
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/xcinema/
            printf '%s\n' '${{ secrets.ENV_FILE }}' > .env
            sed -i 's/^[[:space:]]*//' .env
            chmod 600 .env

      - name: Compose up + migrate
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd /opt/xcinema/
            
            # Renombrar el archivo de prod a docker-compose.yaml para que sea el por defecto
            mv docker-compose.prod.yaml docker-compose.yaml
            
            docker compose up -d --build
            docker image prune -f

            # Migracions Laravel dins Docker
            docker compose exec -T laravel php artisan migrate --force
