upstream laravel {
    server laravel:9000;
}

upstream nuxt {
    server nuxt:3000;
}

upstream realtime {
    server realtime:3001;
}

server {
    listen 80 default_server;
    server_name xcinema.daw.inspedralbes.cat;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    # Redirigir todo lo demás a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name xcinema.daw.inspedralbes.cat;

    ssl_certificate /etc/letsencrypt/live/xcinema.daw.inspedralbes.cat/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xcinema.daw.inspedralbes.cat/privkey.pem;

    # Laravel API (PHP-FPM)
    location /api {
        include fastcgi_params;
        fastcgi_pass laravel:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
    }

    # WebSockets realtime
    location /socket.io/ {
        proxy_pass http://realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Nuxt SSR
    location / {
        proxy_pass http://nuxt;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
