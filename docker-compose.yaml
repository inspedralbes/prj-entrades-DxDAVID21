services:
  laravel:
    build: ./src/backend
    container_name: backend
    ports:
      - "8000:8000"
    volumes:
      - ./src/backend:/var/www
    depends_on:
      - postgres
    command: php artisan serve --host=0.0.0.0 --port=8000

  nuxt:
    build: ./src/prueba
    container_name: prueba
    restart: unless-stopped
    command: bun dev
    ports:
      - "3000:3000"
    volumes:
      - ./src/prueba:/app
      - /app/node_modules
    depends_on:
      - postgres

  node:
    build: ./src/realtime
    container_name: realtime
    ports:
      - "3001:3001"
    volumes:
      - ./src/realtime:/app
    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine
    container_name: db
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_db:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  adminer:
    container_name: adminer
    image: adminer
    restart: always
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres

  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_db:
  redis_data:
